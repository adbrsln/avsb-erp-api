# AVSB-ERP API — Production Nginx Config
# Deploy to: /etc/nginx/sites-available/api.azamventures.com
# Enable:  ln -s /etc/nginx/sites-available/api.azamventures.com /etc/nginx/sites-enabled/
# Test:    nginx -t
# Reload:  systemctl reload nginx

server {
    listen 80;
    server_name api.azamventures.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.azamventures.com;

    # ── SSL (adjust paths to your certs) ──
    ssl_certificate     /etc/ssl/certs/api.azamventures.com.pem;
    ssl_certificate_key /etc/ssl/private/api.azamventures.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Document root ──
    root /home/deployer/workspace/avsb-erp-api/public;
    index index.php;

    # ── Security headers (Laravel app adds more, but nginx catches edge cases) ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Max upload size (matches FileStorageService 50MB) ──
    client_max_body_size 50M;

    # ── Gzip ──
    gzip on;
    gzip_types application/json application/javascript text/css text/xml;
    gzip_min_length 1024;

    # ── Static assets — serve directly, cache aggressively ──
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /storage/ {
        alias /home/deployer/workspace/avsb-erp-api/storage/app/public/;
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public";
    }

    # ── Let Encrypt challenge ──
    location ~ /\.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # ── Deny hidden files ──
    location ~ /\.(?!well-known) {
        deny all;
    }

    # ── Deny access to sensitive files ──
    location ~ \.(env|log|sqlite)$ {
        deny all;
    }

    # ── Laravel front controller ──
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ──
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Laravel optimizations
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 180;
        fastcgi_send_timeout 180;
    }

    # ── Access & error logs ──
    access_log /var/log/nginx/avsb-erp-api-access.log;
    error_log  /var/log/nginx/avsb-erp-api-error.log;
}
