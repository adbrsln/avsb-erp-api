# AVSB-ERP API — Production Nginx Config
# Serves behind Cloudflare Tunnel (cloudflared) on localhost:80
# Deploy to: /etc/nginx/sites-available/avsb-erp-api
# Enable:    ln -s /etc/nginx/sites-available/avsb-erp-api /etc/nginx/sites-enabled/
# Test:      nginx -t
# Reload:    systemctl reload nginx
#
# Seamless switch from Slim to Laravel:
#   1. Deploy code + composer install + migrate
#   2. Swap root path below from old to new
#   3. nginx -t && systemctl reload nginx
#   Zero downtime — nginx reloads gracefully

server {
    listen 127.0.0.1:80 default_server;
    listen [::1]:80 default_server;

    # ── Point this to the Laravel project ──
    root /home/deployer/workspace/avsb-erp-api/public;
    index index.php index.html index.htm;
    server_name _;

    server_tokens off;
    client_max_body_size 50m;

    # ── Laravel front controller ──
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # ── PHP-FPM ──
    location = /index.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-erp.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ── Deny hidden files ──
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Deny sensitive project files ──
    location ~* ^/(composer\.(json|lock)|\.env.*|docker-compose\.yml|.*\.(sql|log|bak|dist))$ {
        deny all;
        return 404;
    }

    # ── Static assets with long cache ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
