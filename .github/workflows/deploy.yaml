name: CI + Deploy

on:
  push:
    branches:
      - main

jobs:
  Unit Test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, bcmath, gd
          tools: composer

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create .env for CI
        run: |
          cp .env.example .env
          php artisan key:generate
          # CI uses SQLite in-memory (phpunit.xml already sets this)

      - name: Run tests
        run: php artisan test --compact

  Deploy:
    runs-on: ubuntu-latest
    needs: Unit Test
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /home/deployer/workspace/avsb-erp-api
            git pull origin main
            composer install --no-dev --no-interaction --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize
            php artisan queue:restart 2>/dev/null || true
            chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true
            chmod -R 775 storage bootstrap/cache 2>/dev/null || true

  Notify:
    runs-on: ubuntu-latest
    needs: [Unit Test, Deploy]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send Telegram Notification
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            CI_STATUS="${{ needs.ci.result }}"
            DEPLOY_STATUS="${{ needs.deploy.result }}"

            if [ "$CI_STATUS" = "failure" ]; then
              ICON="❌"
              STATUS="CI failed"
            elif [ "$CI_STATUS" = "cancelled" ]; then
              ICON="⚠️"
              STATUS="CI cancelled"
            elif [ "$DEPLOY_STATUS" = "failure" ]; then
              ICON="❌"
              STATUS="CI passed, deploy failed"
            elif [ "$DEPLOY_STATUS" = "cancelled" ]; then
              ICON="⚠️"
              STATUS="CI passed, deploy skipped"
            elif [ "$DEPLOY_STATUS" = "success" ]; then
              ICON="✅"
              STATUS="CI passed, deployed"
            else
              ICON="❓"
              STATUS="unknown"
            fi

            MESSAGE="${ICON} *${STATUS}*
            📦 *Repository:* ${{ github.repository }}
            🌿 *Branch:* \`${{ github.ref_name }}\`
            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -s -X POST "https://bot.adbroslan.com/webhook.php" \
              -H "Content-Type: application/json" \
              -H "X-Telegram-Bot-Api-Secret-Token: ${{ secrets.WEBHOOK_BOT_UUID }}" \
              -d "$(jq -n --arg cid '${{ secrets.WEBHOOK_BOT_CHAT_ID }}' --arg msg "$MESSAGE" '{chat_id: $cid, message: $msg}')"
